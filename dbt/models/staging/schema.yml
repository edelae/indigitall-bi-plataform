version: 2

models:
  - name: stg_messages
    description: Cleaned and deduplicated messages with normalized direction values
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: message_id
        tests: [not_null, unique]

  - name: stg_contacts
    description: Deduplicated contacts with non-null totals
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: contact_id
        tests: [not_null]

  - name: stg_agents
    description: Deduplicated agents with non-null totals
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: agent_id
        tests: [not_null]

  - name: stg_toques_daily
    description: Cleaned daily campaign data with recalculated rates
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: date
        tests: [not_null]
      - name: canal
        tests: [not_null]

  - name: stg_campaigns
    description: Cleaned campaign summaries with recalculated rates
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: campana_id
        tests: [not_null, unique]

  - name: stg_chat_conversations
    description: Cleaned conversation sessions with sanitized timing and computed duration
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: session_id
        tests: [not_null]

  - name: stg_chat_topics
    description: Conversation topic categories for categorization
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: topic_id
        tests: [not_null]

  - name: stg_sms_envios
    description: Deduplicated SMS sending records with derived date/hour (API-only)
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: sending_id
        tests: [not_null, unique]

  - name: stg_sms_campaigns
    description: Deduplicated SMS campaigns from v2 API
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: campaign_id
        tests: [not_null, unique]

  - name: stg_sms_contacts
    description: Deduplicated SMS contacts from v2 API
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: contact_id
        tests: [not_null, unique]

  - name: stg_sms_daily_stats
    description: Daily SMS aggregate stats from v2 API with derived rates
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: date
        tests: [not_null]

